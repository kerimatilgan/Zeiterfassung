<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/clock.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2563eb" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Zeiterfassung" />
    <link rel="apple-touch-icon" href="/icon-192.svg" />
    <title>Zeiterfassung</title>
    <script>
      // Dark-Mode vor dem ersten Paint setzen, damit es keinen hellen Flash gibt.
      (function () {
        try {
          var pref = localStorage.getItem('theme-pref');
          if (pref !== 'light' && pref !== 'dark' && pref !== 'system') {
            // Fallback: aus dem persistierten Auth-Store lesen (employee.theme)
            var raw = localStorage.getItem('auth-storage');
            if (raw) {
              var t = JSON.parse(raw)?.state?.employee?.theme;
              if (t === 'light' || t === 'dark' || t === 'system') pref = t;
            }
          }
          if (!pref) pref = 'system';
          var dark = pref === 'dark' ||
            (pref === 'system' && window.matchMedia &&
             window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (dark) document.documentElement.classList.add('dark');
        } catch (e) { /* ignore */ }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
