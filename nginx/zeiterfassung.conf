server {
    listen 5175;
    server_name _;
    root /opt/Zeiterfassung/frontend/dist;
    index index.html;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # Static assets - lange cachen (hashed filenames)
    location /assets/ {
        include snippets/zeiterfassung-security.conf;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # PWA manifest & icons
    location /manifest.json {
        include snippets/zeiterfassung-security.conf;
        expires 1d;
        add_header Cache-Control "public";
    }

    # API Proxy zum Backend
    location /api/ {
        include snippets/zeiterfassung-security.conf;
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # WebSocket Proxy
    location /socket.io/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Uploads Proxy
    location /uploads/ {
        include snippets/zeiterfassung-security.conf;
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
    }

    # SPA Fallback - alle Routes auf index.html
    location / {
        include snippets/zeiterfassung-security.conf;
        try_files $uri $uri/ /index.html;
    }
}
