name: Build & Push Docker Images

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  # Gitea-eigene Container-Registry. Format: <gitea-host>/<owner>/<image>.
  # ACHTUNG: Bei HTTP-only-Gitea muss der Runner-Docker-Daemon den Host als
  # insecure-registry kennen (/etc/docker/daemon.json).
  REGISTRY: 10.10.10.3:3004
  OWNER: kerimatilgan

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backend
            context: ./backend
            image: zeiterfassung-backend
          - service: frontend
            context: ./frontend
            image: zeiterfassung-frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Gitea Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ gitea.actor }}
          # ACHTUNG: secrets.GITEA_TOKEN funktioniert hier NICHT — der hat keinen
          # write:package-Scope. Stattdessen einen Gitea-PAT mit Scope
          # `write:package` anlegen (User-Settings → Applications) und unter
          # Repo-Settings → Actions → Secrets als REGISTRY_TOKEN hinterlegen.
          password: ${{ secrets.REGISTRY_TOKEN }}

      - name: Build & Push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.image }}:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.image }}:${{ gitea.sha }}
