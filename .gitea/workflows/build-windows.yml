name: Build Windows App

# WARNUNG: Windows-Builds brauchen einen Windows-Runner (`runs-on: windows-latest`).
# Wenn dein Gitea-Runner nur auf Linux läuft (typischer act_runner-Setup), wird
# dieser Workflow nichts ausführen — entweder einen separaten Windows-Runner
# registrieren oder den Tauri-Build per Cross-Compile auf Linux machen
# (komplex; benötigt mingw-w64 + nsis, MSI-Build geht nicht ohne Windows).

on:
  workflow_dispatch:
  push:
    tags:
      - 'app-v*'
  pull_request:
    paths:
      - 'frontend/**'
      - '.gitea/workflows/build-windows.yml'

jobs:
  build:
    name: Build Tauri (Windows)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: 'frontend/src-tauri -> target'

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Build frontend
        run: npm run build

      - name: Build Tauri app (MSI + NSIS)
        run: npx tauri build

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: zeiterfassung-windows
          path: |
            frontend/src-tauri/target/release/bundle/msi/*.msi
            frontend/src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 30

      - name: Create Gitea Release (only on tag)
        if: startsWith(gitea.ref, 'refs/tags/app-v')
        uses: https://gitea.com/actions/release-action@main
        with:
          files: |
            frontend/src-tauri/target/release/bundle/msi/*.msi
            frontend/src-tauri/target/release/bundle/nsis/*.exe
          api_key: ${{ secrets.GITEA_TOKEN }}
