services:
  backend:
    image: git.kerimatilgan.de/kerimatilgan/zeiterfassung-backend:latest
    environment:
      - PORT=3001
      # Pflicht — siehe README "Environment Variables"
      - JWT_SECRET=${JWT_SECRET}
      - FRONTEND_URL=${FRONTEND_URL}
      - DOCUMENT_ENCRYPTION_KEY=${DOCUMENT_ENCRYPTION_KEY}
      # Optional
      - TERMINAL_API_KEY=${TERMINAL_API_KEY:-}
      - DATABASE_URL=file:/app/prisma/zeiterfassung.db
    volumes:
      - zeit_data:/app/prisma
      - zeit_reports:/app/reports
      - zeit_uploads:/app/uploads
    # Direkte Port-Veröffentlichung — für Tests ohne Reverse-Proxy einkommentieren:
    # ports:
    #   - "3001:3001"
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.zeit-backend.rule=Host(`zeit-api.kerimatilgan.de`)"
      - "traefik.http.routers.zeit-backend.entrypoints=web"
      - "traefik.http.services.zeit-backend.loadbalancer.server.port=3001"

  frontend:
    image: git.kerimatilgan.de/kerimatilgan/zeiterfassung-frontend:latest
    depends_on:
      - backend
    # Direkte Port-Veröffentlichung — für Tests ohne Reverse-Proxy einkommentieren:
    # ports:
    #   - "8080:80"
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.zeit-frontend.rule=Host(`zeit.kerimatilgan.de`)"
      - "traefik.http.routers.zeit-frontend.entrypoints=web"
      - "traefik.http.services.zeit-frontend.loadbalancer.server.port=80"

volumes:
  zeit_data:
  zeit_reports:
  zeit_uploads:
